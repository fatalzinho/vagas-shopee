<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Guichê</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --laranja: #EE4D2D;
      --laranja2: #ff6b47;
      --preto: #0a0a0a;
      --card: #141414;
      --borda: #262626;
      --texto: #f0ece4;
      --texto-dim: #777;
      --verde: #22c55e;
      --azul: #3b82f6;
      --amarelo: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--preto);
      color: var(--texto);
      font-family: 'Noto Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--card);
      border-bottom: 2px solid var(--laranja);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 20px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
    }

    .header h1 span { color: var(--laranja); }

    .header-right {
      display: flex; align-items: center; gap: 12px;
    }

    .badge-pendentes {
      background: var(--laranja); color: white;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px;
    }

    .header-status { font-size: 12px; color: var(--texto-dim); }

    /* ── TOKEN ── */
    .token-bar {
      background: #0f0800;
      border-bottom: 1px solid rgba(238,77,45,.2);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .token-bar label {
      font-size: 12px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--laranja); white-space: nowrap;
    }

    .token-bar input {
      flex: 1; min-width: 200px;
      background: #0d0d0d;
      border: 1px solid var(--borda);
      border-radius: 6px;
      padding: 7px 12px;
      color: var(--texto);
      font-family: monospace; font-size: 13px;
    }

    .token-bar input:focus { outline: none; border-color: var(--laranja); }

    .btn-sm {
      background: var(--laranja); border: none; color: white;
      padding: 7px 14px; border-radius: 6px; cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 1px;
      white-space: nowrap; transition: background .2s;
    }

    .btn-sm:hover { background: var(--laranja2); }
    .btn-sm.verde { background: var(--verde); }
    .btn-sm.verde:hover { background: #16a34a; }
    .btn-sm.azul  { background: var(--azul); }

    .token-ok {
      font-size: 12px; color: var(--verde);
      display: none; align-items: center; gap: 6px;
    }

    .token-ok.ativo { display: flex; }

    /* ── BARRA ENTRADA/SAÍDA GLOBAL ── */
    .global-bar {
      background: #111;
      border-bottom: 1px solid var(--borda);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .global-bar label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--texto-dim); white-space: nowrap;
    }

    .global-bar select {
      background: #1e1e1e;
      border: 1px solid var(--borda);
      border-radius: 6px;
      padding: 7px 12px;
      color: var(--texto);
      font-family: 'Noto Sans', sans-serif;
      font-size: 14px; font-weight: 600;
      appearance: none; cursor: pointer;
      min-width: 110px;
      transition: border-color .2s;
    }

    .global-bar select:focus { outline: none; border-color: var(--laranja); }

    .es-display {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--texto-dim);
      margin-left: auto;
    }

    .es-tag {
      background: rgba(238,77,45,.12);
      border: 1px solid rgba(238,77,45,.3);
      color: var(--laranja);
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px; font-weight: 700;
      padding: 2px 10px; border-radius: 4px;
    }

    /* ── LAYOUT PRINCIPAL ── */
    .main {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 160px);
    }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
    }

    /* ── PAINEL FILA ── */
    .painel {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 10px;
      overflow: hidden;
      align-self: start;
    }

    .painel-titulo {
      background: #1a1a1a;
      padding: 10px 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--texto-dim);
      border-bottom: 1px solid var(--borda);
      display: flex; align-items: center; justify-content: space-between;
    }

    .fila-vazia {
      padding: 36px 20px; text-align: center;
      color: var(--texto-dim); font-size: 13px;
    }

    .fila-vazia p:first-child { font-size: 30px; margin-bottom: 8px; }

    /* ── CARD DE CHECKIN ── */
    .checkin-card {
      padding: 14px 14px;
      border-bottom: 1px solid var(--borda);
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(-6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .checkin-card:last-child { border-bottom: none; }

    .card-top {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 6px;
    }

    .card-nome { font-weight: 600; font-size: 14px; }

    .card-rota {
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px; font-weight: 700; color: var(--laranja);
    }

    .card-meta {
      font-size: 11px; color: var(--texto-dim); margin-bottom: 10px;
    }

    .cf-group { margin-bottom: 8px; }

    .cf-group label {
      display: block; font-size: 10px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--texto-dim); margin-bottom: 4px;
    }

    .cf-group input {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid var(--borda);
      border-radius: 5px;
      padding: 7px 10px;
      color: var(--texto);
      font-family: 'Noto Sans', sans-serif; font-size: 13px;
    }

    .cf-group input:focus { outline: none; border-color: var(--laranja); }

    .btn-ok {
      width: 100%;
      background: var(--verde); border: none; color: white;
      padding: 9px; border-radius: 6px; cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: 1px;
      transition: all .2s; margin-top: 4px;
    }

    .btn-ok:hover { background: #16a34a; transform: translateY(-1px); }
    .btn-ok:disabled { background: #333; color: #555; cursor: not-allowed; transform: none; }

    .btn-rejeitar {
      width: 100%; background: transparent;
      border: 1px solid #2a2a2a; color: var(--texto-dim);
      padding: 6px; border-radius: 6px; cursor: pointer;
      font-size: 11px; margin-top: 5px; transition: all .2s;
    }

    .btn-rejeitar:hover { border-color: #ef4444; color: #ef4444; }

    /* ── TABELA ── */
    .painel-tabela {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 10px;
      overflow: hidden;
    }

    .table-scroll { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      background: #1a1a1a; color: var(--texto-dim);
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 10px 12px; text-align: center;
      border-bottom: 1px solid var(--borda); white-space: nowrap;
    }

    tbody td {
      padding: 10px 12px; text-align: center;
      border-bottom: 1px solid #1a1a1a;
      vertical-align: middle; font-size: 13px;
    }

    tbody tr:hover { background: #161616; }

    .tag-vaga {
      background: #222; color: var(--texto);
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px; font-weight: 700;
      border-radius: 4px; display: inline-block;
      padding: 2px 10px; min-width: 36px;
    }

    .tag-carregar {
      background: rgba(34,197,94,.12); color: var(--verde);
      border: 1px solid rgba(34,197,94,.25);
      border-radius: 4px; padding: 3px 8px;
      font-size: 11px; font-weight: 600;
    }

    .tag-patio {
      background: rgba(59,130,246,.12); color: var(--azul);
      border: 1px solid rgba(59,130,246,.25);
      border-radius: 4px; padding: 3px 8px;
      font-size: 11px; font-weight: 600;
    }

    .tag-outro {
      background: rgba(255,255,255,.04); color: var(--texto-dim);
      border: 1px solid var(--borda);
      border-radius: 4px; padding: 3px 8px;
      font-size: 11px;
    }

    /* ── TOAST ── */
    .toast-container {
      position: fixed; top: 14px; right: 14px;
      z-index: 9999; display: flex; flex-direction: column;
      gap: 8px; pointer-events: none; max-width: 280px;
    }

    .toast {
      background: var(--card); border: 1px solid var(--borda);
      border-left: 3px solid var(--laranja); color: var(--texto);
      padding: 10px 14px; border-radius: 8px; font-size: 13px;
      animation: toastIn .3s ease; pointer-events: auto;
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
    }

    .toast.verde { border-left-color: var(--verde); }
    .toast.erro  { border-left-color: #ef4444; }
    .toast.saindo { animation: toastOut .3s ease forwards; }

    @keyframes toastIn  { from{transform:translateX(300px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes toastOut { from{transform:translateX(0);opacity:1} to{transform:translateX(300px);opacity:0} }

    .loading { text-align:center; padding:40px; color:var(--texto-dim); }
  </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- HEADER -->
<div class="header">
  <h1>ADMIN <span>GUICHÊ</span></h1>
  <div class="header-right">
    <span class="badge-pendentes" id="badgePendentes">0 pendentes</span>
    <span class="header-status" id="headerStatus">⏳ Conectando...</span>
  </div>
</div>

<!-- TOKEN -->
<div class="token-bar">
  <label>🔑 Token:</label>
  <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
  <button class="btn-sm" onclick="salvarToken()">Salvar</button>
  <div class="token-ok" id="tokenOk">
    ✅ Token salvo
    <button onclick="limparToken()" style="background:none;border:none;color:#555;cursor:pointer;font-size:11px;margin-left:4px">trocar</button>
  </div>
</div>

<!-- ENTRADA/SAÍDA GLOBAL -->
<div class="global-bar">
  <label>Entrada:</label>
  <select id="selEntrada">
    <option value="">-- Selecione --</option>
    <option value="Fundos">Fundos</option>
    <option value="Frente">Frente</option>
  </select>

  <label>Saída:</label>
  <select id="selSaida">
    <option value="">-- Selecione --</option>
    <option value="Fundos">Fundos</option>
    <option value="Frente">Frente</option>
  </select>

  <button class="btn-sm verde" onclick="salvarEntradaSaida()">💾 Salvar</button>

  <div class="es-display" id="esDisplay" style="display:none">
    <span style="font-size:11px;color:var(--texto-dim)">Atual:</span>
    <span class="es-tag" id="esAtualEntrada">—</span>
    <span style="color:#444">→</span>
    <span class="es-tag" id="esAtualSaida">—</span>
  </div>
</div>

<!-- LAYOUT -->
<div class="main">

  <!-- FILA PENDENTES -->
  <div class="painel">
    <div class="painel-titulo">
      <span>⏳ CHECK-INS PENDENTES</span>
      <span id="countPendentes" style="color:var(--laranja)">0</span>
    </div>
    <div id="filaCheckins">
      <div class="fila-vazia">
        <p>✅</p>
        <p>Nenhum check-in pendente</p>
      </div>
    </div>
  </div>

  <!-- TABELA DE VAGAS -->
  <div class="painel painel-tabela">
    <div class="painel-titulo">
      <span>📋 TABELA DE VAGAS</span>
      <span id="tsTabela" style="color:var(--texto-dim);font-size:10px"></span>
    </div>
    <div class="table-scroll">
      <div id="tabelaVagas" class="loading"><p>Carregando...</p></div>
    </div>
  </div>

</div>

<script>
  // ── CONFIG ──
  const GITHUB_USER  = 'fatalzinho';
  const GITHUB_REPO  = 'vagas-shopee';
  const VAGAS_JSON   = 'vagas.json';
  const CHECKIN_JSON = 'checkin.json';
  const POLL_MS      = 6000;

  let githubToken    = localStorage.getItem('adminToken') || '';
  let checkinSha     = '';

  // Token UI
  if (githubToken) {
    document.getElementById('tokenInput').value = githubToken;
    document.getElementById('tokenOk').classList.add('ativo');
  }

  function salvarToken() {
    const t = document.getElementById('tokenInput').value.trim();
    if (!t) { toast('⚠️ Digite o token!'); return; }
    githubToken = t;
    localStorage.setItem('adminToken', t);
    document.getElementById('tokenOk').classList.add('ativo');
    toast('✅ Token salvo!', 'verde');
  }

  function limparToken() {
    githubToken = '';
    localStorage.removeItem('adminToken');
    document.getElementById('tokenInput').value = '';
    document.getElementById('tokenOk').classList.remove('ativo');
  }

  // ── TOAST ──
  function toast(msg, tipo='') {
    const c  = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${tipo}`; el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => { el.classList.add('saindo'); setTimeout(() => el.remove(), 300); }, 4000);
  }

  // ── FETCH JSON ──
  async function fetchJson(arq) {
    const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${arq}?t=${Date.now()}`;
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }

  // Fetch com SHA para escrita
  async function fetchCheckinComSha() {
    const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${CHECKIN_JSON}`;
    const r = await fetch(url, { headers: { Authorization: `token ${githubToken}` } });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    checkinSha = data.sha;
    return JSON.parse(atob(data.content.replace(/\n/g,'')));
  }

  // Salva checkin.json no GitHub
  async function salvarCheckinJson(payload) {
    if (!githubToken) { toast('⚠️ Configure o token!', 'erro'); return false; }

    const url  = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${CHECKIN_JSON}`;
    const body = JSON.stringify(payload, null, 2);

    const r = await fetch(url, {
      method: 'PUT',
      headers: {
        Authorization: `token ${githubToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: 'Admin: atualiza checkin.json',
        content: btoa(unescape(encodeURIComponent(body))),
        sha: checkinSha
      })
    });

    if (!r.ok) {
      const e = await r.json();
      throw new Error(e.message || r.status);
    }

    const data = await r.json();
    checkinSha = data.content.sha;
    return true;
  }

  // ── SALVAR ENTRADA/SAÍDA GLOBAL ──
  async function salvarEntradaSaida() {
    if (!githubToken) { toast('⚠️ Configure o token primeiro!', 'erro'); return; }

    const entrada = document.getElementById('selEntrada').value;
    const saida   = document.getElementById('selSaida').value;

    if (!entrada || !saida) { toast('⚠️ Selecione Entrada e Saída!'); return; }

    try {
      const dados = await fetchCheckinComSha();
      dados.entrada    = entrada;
      dados.saida      = saida;
      dados.lastUpdate = new Date().toISOString();

      await salvarCheckinJson(dados);
      toast(`✅ Entrada: ${entrada} | Saída: ${saida} salvo!`, 'verde');
      atualizarEsDisplay(entrada, saida);
    } catch(e) {
      toast(`❌ Erro: ${e.message}`, 'erro');
    }
  }

  function atualizarEsDisplay(entrada, saida) {
    if (!entrada && !saida) {
      document.getElementById('esDisplay').style.display = 'none';
      return;
    }
    document.getElementById('esAtualEntrada').textContent = entrada || '—';
    document.getElementById('esAtualSaida').textContent   = saida   || '—';
    document.getElementById('esDisplay').style.display    = 'flex';
  }

  // ── CONFIRMAR CHECKIN ──
  async function confirmarCheckin(rota, btnEl) {
    if (!githubToken) { toast('⚠️ Configure o token!', 'erro'); return; }

    const gaiola = document.getElementById(`gaiola-${rota}`).value.trim();
    if (!gaiola) { toast('⚠️ Informe a gaiola!'); return; }

    btnEl.disabled = true;
    btnEl.textContent = '⏳ Salvando...';

    try {
      const dados    = await fetchCheckinComSha();
      const checkins = dados.checkins || [];
      const idx      = checkins.findIndex(c => c.rota === rota);

      if (idx >= 0) {
        checkins[idx].status      = 'confirmado';
        checkins[idx].gaiola      = gaiola;
        checkins[idx].confirmedAt = new Date().toISOString();
      }

      dados.checkins    = checkins;
      dados.lastUpdate  = new Date().toISOString();

      await salvarCheckinJson(dados);
      toast(`✅ ${rota} confirmado!`, 'verde');

      // Remove card com animação
      const card = document.getElementById(`card-${rota}`);
      if (card) {
        card.style.transition = 'all .3s';
        card.style.opacity    = '0';
        card.style.transform  = 'translateX(-20px)';
        setTimeout(() => card.remove(), 300);
      }
    } catch(e) {
      toast(`❌ Erro: ${e.message}`, 'erro');
      btnEl.disabled = false;
      btnEl.textContent = '✓ OK — CONFIRMAR';
    }
  }

  async function rejeitarCheckin(rota) {
    if (!confirm(`Remover check-in de ${rota}?`)) return;
    try {
      const dados    = await fetchCheckinComSha();
      dados.checkins = (dados.checkins || []).filter(c => c.rota !== rota);
      dados.lastUpdate = new Date().toISOString();
      await salvarCheckinJson(dados);
      toast(`🗑️ Check-in de ${rota} removido`);
    } catch(e) {
      toast(`❌ Erro: ${e.message}`, 'erro');
    }
  }

  // ── RENDERIZA FILA ──
  function renderFila(checkins) {
    const pendentes = (checkins || []).filter(c => c.status === 'aguardando');
    document.getElementById('badgePendentes').textContent =
      `${pendentes.length} pendente${pendentes.length !== 1 ? 's' : ''}`;
    document.getElementById('countPendentes').textContent = pendentes.length;

    if (!pendentes.length) {
      document.getElementById('filaCheckins').innerHTML =
        `<div class="fila-vazia"><p>✅</p><p>Nenhum check-in pendente</p></div>`;
      return;
    }

    document.getElementById('filaCheckins').innerHTML = pendentes.map(c => {
      const ts = c.ts
        ? new Date(c.ts).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' })
        : '';
      return `
        <div class="checkin-card" id="card-${c.rota}">
          <div class="card-top">
            <span class="card-nome">${c.nome}</span>
            <span class="card-rota">${c.rota}</span>
          </div>
          <div class="card-meta">ID: ${c.id}${ts ? ' • ' + ts : ''}</div>
          <div class="cf-group">
            <label>Gaiola</label>
            <input type="text" id="gaiola-${c.rota}" placeholder="Ex: C5" maxlength="6">
          </div>
          <button class="btn-ok" onclick="confirmarCheckin('${c.rota}', this)">
            ✓ OK — CONFIRMAR
          </button>
          <button class="btn-rejeitar" onclick="rejeitarCheckin('${c.rota}')">
            Remover da fila
          </button>
        </div>`;
    }).join('');
  }

  // ── RENDERIZA TABELA ──
  function renderTabela(vagas, checkins) {
    const linhas = vagas.data;
    const mapaC  = {};
    (checkins || []).forEach(c => { mapaC[c.rota] = c; });

    if (!linhas || linhas.length < 4) {
      document.getElementById('tabelaVagas').innerHTML =
        '<div class="loading"><p style="color:#555">Sem dados</p></div>';
      return;
    }

    let html = `<table><thead><tr>
      <th>Turno</th><th>Driver</th><th>Rota</th>
      <th>Vaga</th><th>Status</th><th>Check-in</th>
    </tr></thead><tbody>`;

    linhas.slice(3).forEach(linha => {
      if (!linha || !linha[2]) return;

      const turno  = linha[0] || '';
      const driver = linha[1] || '';
      const rota   = linha[2] || '';
      const vaga   = linha[3] !== undefined ? linha[3] : '-';
      const status = linha[4] || '';

      const c = mapaC[rota];
      let checkinHtml = '<span style="color:#333">—</span>';
      if (c && c.status === 'confirmado')  checkinHtml = '✅';
      else if (c && c.status === 'aguardando') checkinHtml = '⏳';

      let cls = 'tag-outro';
      if (status.toLowerCase().includes('carregar')) cls = 'tag-carregar';
      else if (status.toLowerCase().includes('pátio') || status.toLowerCase().includes('patio')) cls = 'tag-patio';

      html += `<tr>
        <td>${turno}</td>
        <td style="font-size:11px;color:var(--texto-dim)">${driver}</td>
        <td><strong style="font-family:'Rajdhani',sans-serif;font-size:14px">${rota}</strong></td>
        <td><span class="tag-vaga">${vaga}</span></td>
        <td><span class="${cls}">${status}</span></td>
        <td style="font-size:16px">${checkinHtml}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('tabelaVagas').innerHTML = html;
    document.getElementById('tsTabela').textContent =
      new Date(vagas.lastUpdate).toLocaleTimeString('pt-BR');
  }

  // ── POLLING ──
  async function atualizar() {
    try {
      const [vagas, checkinData] = await Promise.all([
        fetchJson(VAGAS_JSON),
        fetchJson(CHECKIN_JSON).catch(() => ({ checkins:[], entrada:'', saida:'' }))
      ]);

      renderFila(checkinData.checkins || []);
      renderTabela(vagas, checkinData.checkins || []);

      // Atualiza selects e display de entrada/saída com valores atuais do JSON
      if (checkinData.entrada) {
        document.getElementById('selEntrada').value = checkinData.entrada;
        document.getElementById('selSaida').value   = checkinData.saida || '';
        atualizarEsDisplay(checkinData.entrada, checkinData.saida);
      }

      document.getElementById('headerStatus').innerHTML =
        `<span style="color:var(--verde)">🟢 AO VIVO</span>`;

    } catch(e) {
      document.getElementById('headerStatus').innerHTML =
        `<span style="color:#ef4444">⚠️ Erro</span>`;
      console.error(e);
    }
  }

  atualizar();
  setInterval(atualizar, POLL_MS);
</script>
</body>
</html>
