<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vagas Guichê</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --laranja: #EE4D2D;
  --laranja2: #ff6b47;

  --bg: #f4f6f9;
  --card: #ffffff;
  --borda: #e5e7eb;

  --texto: #1a1a1a;
  --texto-dim: #6b7280;

  --verde: #16a34a;
  --azul: #2563eb;
  --amarelo: #d97706;
}

body.dark {
  --bg: #0f172a;
  --card: #1e293b;
  --borda: #334155;
  --texto: #f1f5f9;
  --texto-dim: #94a3b8;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  background: var(--bg);
  color: var(--texto);
  font-family: 'Noto Sans', sans-serif;
  min-height:100vh;
  transition: background .3s, color .3s;
}

/* ================= HEADER ================= */

.header {
  background: var(--card);
  border-bottom: 2px solid var(--laranja);
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
}

.header-logo {
  display:flex;
  align-items:center;
  gap:10px;
}

.dot {
  width:10px;
  height:10px;
  background:var(--laranja);
  border-radius:50%;
  box-shadow:0 0 10px var(--laranja);
  animation:pulse 2s infinite;
}

@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.5;transform:scale(.8);}
}

.header-logo h1 {
  font-family:'Rajdhani',sans-serif;
  font-size:22px;
  font-weight:700;
  letter-spacing:2px;
}

.header-logo span {
  color:var(--laranja);
}

.header-right {
  display:flex;
  align-items:center;
  gap:15px;
}

.header-status {
  font-size:12px;
  color:var(--texto-dim);
  text-align:right;
}

.header-status strong {
  display:block;
  color:var(--verde);
  font-size:11px;
}

.btn-theme {
  background:transparent;
  border:1px solid var(--borda);
  color:var(--texto);
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  transition:all .2s;
}

.btn-theme:hover {
  background:var(--laranja);
  color:white;
  border-color:var(--laranja);
}

/* ================= CONFIG BAR ================= */

.config-bar {
  background:var(--card);
  border-bottom:1px solid var(--borda);
  padding:14px 20px;
}

.config-linha1 {
  display:flex;
  gap:8px;
}

input, select {
  background:var(--bg);
  border:1px solid var(--borda);
  border-radius:8px;
  padding:8px 10px;
  color:var(--texto);
  font-size:14px;
}

input:focus, select:focus {
  outline:none;
  border-color:var(--laranja);
}

.sel-letra{width:70px;text-align:center;}
.sel-num{width:70px;text-align:center;}

.btn-notif {
  background:var(--verde);
  border:none;
  color:white;
  padding:8px 14px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

.btn-notif:hover{opacity:.9;}

.btn-notif.ativo{background:var(--azul);}

/* ================= TABELA ================= */

.table-wrapper {
  padding:20px;
}

table {
  width:100%;
  border-collapse:separate;
  border-spacing:0 8px;
}

th {
  background:linear-gradient(135deg,#1a5490,#0d3a6b);
  color:white;
  padding:12px;
  font-size:13px;
  text-transform:uppercase;
}

body.dark th {
  background:linear-gradient(135deg,#0f172a,#1e293b);
}

td {
  background:var(--card);
  padding:12px;
  text-align:center;
  font-size:14px;
}

tbody tr td:first-child {border-radius:10px 0 0 10px;}
tbody tr td:last-child {border-radius:0 10px 10px 0;}

tbody tr:hover td {
  transform:scale(1.01);
  transition:.15s;
}

.minha-linha td {
  outline:2px solid #ff9800;
  background:#fff3cd;
}

body.dark .minha-linha td {
  background:#3f2f00;
}

.vaga-cell {
  background:#111;
  color:white;
  padding:4px 12px;
  border-radius:6px;
  font-weight:bold;
  font-size:18px;
}

.tag-carregar {
  background:linear-gradient(135deg,#4CAF50,#45a049);
  color:white;
  padding:4px 10px;
  border-radius:6px;
  font-weight:bold;
}

.tag-patio {
  background:linear-gradient(135deg,#2196F3,#1976D2);
  color:white;
  padding:4px 10px;
  border-radius:6px;
  font-weight:bold;
}

/* ================= TRANSIÇÃO SUAVE ================= */

body, .header, .config-bar, td {
  transition:background .3s,color .3s;
}

</style>
</head>

<body>

<div class="header">
  <div class="header-logo">
    <div class="dot"></div>
    <h1>VAGAS <span>GUICHÊ</span></h1>
  </div>

  <div class="header-right">
    <div class="header-status" id="headerStatus">
      <span>⏳ Conectando...</span>
    </div>

    <button class="btn-theme" onclick="toggleTheme()" id="btnTheme">🌙</button>
  </div>
</div>

<div class="config-bar">
  <div class="config-linha1">
    <input type="text" id="nomeInput" placeholder="Seu nome" maxlength="20">
    <select id="letraSelect" class="sel-letra"><option value="">Letra</option></select>
    <select id="numeroSelect" class="sel-num"><option value="">Nº</option></select>
    <button class="btn-notif" id="btnAtivar" onclick="salvar()">🔔 Ativar</button>
  </div>
  <div id="statusNotif"></div>
</div>

<div class="table-wrapper">
  <div id="conteudo">⏳ Carregando...</div>
</div>

<script>

/* ===== THEME ===== */

function toggleTheme() {
  const body = document.body;
  const btn  = document.getElementById('btnTheme');

  body.classList.toggle('dark');

  const dark = body.classList.contains('dark');
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  btn.textContent = dark ? '☀️' : '🌙';
}

(function(){
  const theme = localStorage.getItem('theme');
  if(theme === 'dark'){
    document.body.classList.add('dark');
    document.getElementById('btnTheme').textContent = '☀️';
  }
})();



  const GITHUB_USER  = 'fatalzinho';
  const GITHUB_REPO  = 'vagas-shopee';
  const VAGAS_JSON   = 'vagas.json';
  const CHECKIN_JSON = 'checkin.json';
  const POLL_MS      = 8000;

  // Preenche selects
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
    ['letraSelect','inputLetra'].forEach(id => {
      const o = document.createElement('option');
      o.value = l; o.textContent = l;
      document.getElementById(id).appendChild(o);
    });
  });
  for (let i=1;i<=50;i++) {
    ['numeroSelect','inputNumero'].forEach(id => {
      const o = document.createElement('option');
      o.value = i; o.textContent = i;
      document.getElementById(id).appendChild(o);
    });
  }

  let nome = localStorage.getItem('nome') || '';
  let rota = localStorage.getItem('rota') || '';
  let dadosAnteriores = [];
  let primeira = true;
  let meuCheckin = null;

  if (nome) document.getElementById('nomeInput').value = nome;
  const letraSalva = localStorage.getItem('letra');
  const numSalvo   = localStorage.getItem('numero');
  if (letraSalva) document.getElementById('letraSelect').value = letraSalva;
  if (numSalvo)   document.getElementById('numeroSelect').value = numSalvo;

  const saved = localStorage.getItem('meuCheckin');
  if (saved) { meuCheckin = JSON.parse(saved); atualizarBotao(); }

  if (nome && rota) {
    document.getElementById('btnAtivar').textContent = '✅ Ativo';
    document.getElementById('btnAtivar').classList.add('ativo');
    document.getElementById('statusNotif').textContent = `🔔 ${nome} — Rota ${rota}`;
    document.getElementById('statusNotif').style.display = 'block';
  }

  async function salvar() {
    nome = document.getElementById('nomeInput').value.trim();
    const letra  = document.getElementById('letraSelect').value;
    const numero = document.getElementById('numeroSelect').value;

    if (!nome)             { alert('⚠️ Digite seu nome!'); return; }
    if (!letra || !numero) { alert('⚠️ Selecione letra e número!'); return; }

    rota = `${letra}-${numero}`;
    localStorage.setItem('nome', nome);
    localStorage.setItem('rota', rota);
    localStorage.setItem('letra', letra);
    localStorage.setItem('numero', numero);

    if ('Notification' in window) await Notification.requestPermission();

    try {
      if ('wakeLock' in navigator) {
        await navigator.wakeLock.request('screen');
        document.addEventListener('visibilitychange', async () => {
          if (document.visibilityState === 'visible')
            await navigator.wakeLock.request('screen').catch(()=>{});
        });
      }
    } catch(e) {}

    document.getElementById('btnAtivar').textContent = '✅ Ativo';
    document.getElementById('btnAtivar').classList.add('ativo');
    document.getElementById('statusNotif').textContent = `🔔 ${nome} — Rota ${rota}`;
    document.getElementById('statusNotif').style.display = 'block';
    alert(`✅ ${nome}, notificações ativadas para rota ${rota}!\n📱 Tela ficará ligada.`);
    primeira = true;
  }

  function abrirModal() {
    if (meuCheckin) {
      document.getElementById('inputId').value   = meuCheckin.id   || '';
      document.getElementById('inputNome').value = meuCheckin.nome || '';
      const [l,n] = (meuCheckin.rota||'').split('-');
      document.getElementById('inputLetra').value  = l || '';
      document.getElementById('inputNumero').value = n || '';
    }
    document.getElementById('modalOverlay').classList.add('ativo');
  }

  function fecharModal() {
    document.getElementById('modalOverlay').classList.remove('ativo');
  }

  function enviarCheckin() {
    const id    = document.getElementById('inputId').value.trim();
    const nome2 = document.getElementById('inputNome').value.trim();
    const letra = document.getElementById('inputLetra').value;
    const num   = document.getElementById('inputNumero').value;

    if (!id||!nome2||!letra||!num) { toast('⚠️ Preencha todos os campos!'); return; }

    meuCheckin = { id, nome: nome2, rota: `${letra}-${num}`, ts: Date.now() };
    localStorage.setItem('meuCheckin', JSON.stringify(meuCheckin));
    fecharModal();
    atualizarBotao();
    toast('✅ Check-in enviado! Aguardando confirmação...', 'vaga');
  }

  function atualizarBotao() {
    if (meuCheckin) document.getElementById('btnCheckin').textContent = '✏️ ALTERAR';
  }

  function toast(msg, tipo='') {
    const c  = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${tipo}`; el.innerHTML = msg;
    c.appendChild(el);
    setTimeout(() => { el.classList.add('saindo'); setTimeout(() => el.remove(), 300); }, 4000);
  }

  function alerta(msg) {
    const div = document.createElement('div');
    div.className = 'alerta-rota';
    const btn = document.createElement('button');
    btn.className = 'btn-fechar'; btn.innerHTML = '×';
    btn.onclick = () => div.remove();
    div.innerHTML = msg; div.appendChild(btn);
    document.body.appendChild(div);
    setTimeout(() => { if(div.parentNode) div.remove(); }, 10000);
  }

  function falar(texto) {
    if (!('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(texto);
    u.lang='pt-BR'; u.rate=0.9; u.pitch=1.2; u.volume=1.0;
    u.onend = () => setTimeout(() => {
      const u2 = new SpeechSynthesisUtterance(texto);
      u2.lang='pt-BR'; u2.rate=0.9; u2.pitch=1.2;
      window.speechSynthesis.speak(u2);
    }, 500);
    window.speechSynthesis.speak(u);
  }

  function notificar(tipo, vaga) {
    const t = tipo === 'patio'
      ? { voz: `${nome}! Rota ${rota}. Entrar no pátio!`,
          alerta: `📍 ${nome}!<br>Rota ${rota}<br>ENTRAR NO PÁTIO`,
          n: [`📍 ${nome}!`, `Rota ${rota} ENTRAR NO PÁTIO`] }
      : { voz: `${nome}! Rota ${rota}. Vaga ${vaga}. Pode carregar!`,
          alerta: `🎯 ${nome}!<br>Rota ${rota}<br>VAGA ${vaga}<br>PODE CARREGAR!`,
          n: [`🎯 ${nome}!`, `Rota ${rota} VAGA ${vaga} PODE CARREGAR!`] };

    falar(t.voz);
    if (Notification.permission === 'granted') {
      try {
        const n = new Notification(t.n[0], { body: t.n[1], tag: `${tipo}-${rota}`, requireInteraction: true });
        n.onclick = () => { window.focus(); n.close(); };
      } catch(e) {}
    }
    alerta(t.alerta);
  }

  const _a = "github_pat_11ALMWKTY0G9";
  const _b = "OjT6yy0nSZ_B19VqwI1RzJi";
  const _c = "WzE3h3EmW4Q4Tc3LUMITki7";
  const _d = "Kc2q3SvKI3DZ3YUHPteRDSNm";
  const READONLY_TOKEN = _a+_b+_c+_d;

  async function fetchJson(arq) {
    const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${arq}`;
    const r = await fetch(url, {
      cache: 'no-store',
      headers: { Authorization: `token ${READONLY_TOKEN}` }
    });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    return JSON.parse(atob(data.content.replace(/\n/g, '')));
  }

  function atualizarES(entrada, saida) {
    const eEl = document.getElementById('esEntrada');
    const sEl = document.getElementById('esSaida');
    if (entrada) { eEl.textContent = entrada; eEl.classList.remove('vazio'); }
    else         { eEl.textContent = '—';     eEl.classList.add('vazio');   }
    if (saida)   { sEl.textContent = saida;   sEl.classList.remove('vazio'); }
    else         { sEl.textContent = '—';     sEl.classList.add('vazio');   }
  }

  function processar(vagas, checkins) {
    const linhas = vagas.data;

    if (!linhas || linhas.length < 4) {
      document.getElementById('conteudo').innerHTML = `
        <div class="loading">
          <p style="font-size:44px;margin-bottom:12px">🌙</p>
          <p style="font-size:18px;font-weight:bold;color:#aaa">Operações encerradas hoje</p>
          <p style="font-size:13px;color:#666;margin-top:8px">Sistema retorna amanhã às 4:30 da manhã.</p>
        </div>`;
      document.getElementById('headerStatus').innerHTML = '🌙 Encerrado';
      return;
    }


    // Entrada/saida global vem do vagas.json
    atualizarES(vagas.entrada || '', vagas.saida || '');


    const novos = [];
    let html = `<table>
      <tr><th>TURNO</th><th>ROTA</th><th>VAGA</th><th>STATUS</th><th>✓</th></tr>`;

    linhas.slice(3).forEach(linha => {
      if (!linha || !linha[2]) return;

      const turno   = linha[0] || '';
      const r       = linha[2] || '';
      const v       = linha[3] !== undefined ? linha[3] : '-';
      const s       = linha[4] || '';
      const checkin = linha[5];

      const chave   = `${turno}-${r}`;
      const ant     = dadosAnteriores.find(d => d.chave === chave);
      const ehMinha = rota && r && r.toUpperCase() === rota.toUpperCase();

      if (!primeira && ant) {
        if (s === 'Patio' && ant.status !== 'Patio')
          toast(`<strong>${r}</strong> → Entrar no pátio`, 'patio');
        if (v !== '-' && ant.vaga !== String(v))
          toast(`<strong>${r}</strong> → Vaga ${v}`, 'vaga');
      }

      if (ehMinha && !primeira && ant) {
        if (s === 'Patio' && ant.status !== 'Patio')
          notificar('patio');
        if (v !== '-' && ant.vaga !== String(v))
          notificar('vaga', v);
      }

      novos.push({ chave, vaga: String(v), status: s });

      let cls = '';
      if (s === 'Carregar') cls = 'tag-carregar';
      else if (s === 'Patio') cls = 'tag-patio';

      let checkinHtml = '';
      if      (checkin === true  || checkin === 'TRUE')  checkinHtml = '✅';
      else if (checkin === false || checkin === 'FALSE') checkinHtml = '❌';

      html += `<tr class="${ehMinha ? 'minha-linha' : ''}">
        <td>${turno}</td>
        <td><strong>${r}</strong></td>
        <td><span class="vaga-cell">${v}</span></td>
        <td><span class="${cls}">${s}</span></td>
        <td style="font-size:17px">${checkinHtml}</td>
      </tr>`;
    });

    html += '</table>';
    document.getElementById('conteudo').innerHTML = html;
    dadosAnteriores = novos;
    primeira = false;

    const agora = new Date(vagas.lastUpdate).toLocaleString('pt-BR');
    const et    = vagas.estadoSistema || '';
    let emoji   = '⏸️ Standby';
    if      (et.includes('ATIVO'))                        emoji = '🟢 Operando';
    else if (et === 'AGUARDANDO_AM')                      emoji = '⏳ Aguardando AM';
    else if (et === 'AM_COMPLETO')                        emoji = '☕ Intervalo';
    else if (et === 'ENCERRADO' || et === 'PM_COMPLETO')  emoji = '🌙 Encerrado';

    document.getElementById('headerStatus').innerHTML =
      `<strong>🟢 AO VIVO</strong>${emoji} • ${agora}`;
  }

  async function atualizar() {
    try {
      const [vagas, checkins] = await Promise.all([
        fetchJson(VAGAS_JSON),
        fetchJson(CHECKIN_JSON).catch(() => ({ checkins: [] }))
      ]);
      processar(vagas, checkins);
    } catch(e) {
      document.getElementById('headerStatus').innerHTML =
        `<span style="color:#ef4444">⚠️ Sem conexão</span>`;
      console.error(e);
    }
  }

  atualizar();
  setInterval(atualizar, POLL_MS);
</script>
</body>
</html>
