<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vagas Guichê</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --laranja: #EE4D2D;
      --laranja2: #ff6b47;
      --preto: #0d0d0d;
      --card: #161616;
      --borda: #2a2a2a;
      --texto: #f0ece4;
      --texto-dim: #888;
      --verde: #22c55e;
      --azul: #3b82f6;
      --amarelo: #f59e0b;
      --vermelho: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--preto);
      color: var(--texto);
      font-family: 'Noto Sans', sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: var(--card);
      border-bottom: 2px solid var(--laranja);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo .dot {
      width: 10px; height: 10px;
      background: var(--laranja);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--laranja);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .header-logo h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--texto);
    }

    .header-logo h1 span { color: var(--laranja); }

    .header-status {
      font-size: 12px;
      color: var(--texto-dim);
      text-align: right;
      line-height: 1.5;
    }

    .header-status strong {
      display: block;
      color: var(--verde);
      font-size: 11px;
    }

    /* CHECKIN BAR */
    .checkin-bar {
      background: #111;
      border-bottom: 1px solid var(--borda);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .checkin-info {
      flex: 1;
      min-width: 200px;
    }

    .checkin-info p {
      font-size: 13px;
      color: var(--texto-dim);
    }

    .checkin-info strong {
      font-size: 14px;
      color: var(--texto);
    }

    .btn-checkin {
      background: var(--laranja);
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-checkin:hover {
      background: var(--laranja2);
      transform: translateY(-1px);
    }

    .btn-checkin:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
      transform: none;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .status-badge.aguardando {
      background: rgba(245,158,11,0.15);
      border: 1px solid var(--amarelo);
      color: var(--amarelo);
    }

    .status-badge.confirmado {
      background: rgba(34,197,94,0.15);
      border: 1px solid var(--verde);
      color: var(--verde);
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.ativo { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--borda);
      border-top: 3px solid var(--laranja);
      border-radius: 12px;
      padding: 28px;
      width: 90%;
      max-width: 420px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal h2 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 20px;
      color: var(--texto);
    }

    .modal h2 span { color: var(--laranja); }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--texto-dim);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid var(--borda);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--texto);
      font-family: 'Noto Sans', sans-serif;
      font-size: 15px;
      transition: border-color 0.2s;
      appearance: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--laranja);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .btn-cancelar {
      flex: 1;
      background: transparent;
      border: 1px solid var(--borda);
      color: var(--texto-dim);
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn-cancelar:hover { border-color: #555; color: var(--texto); }

    .btn-enviar {
      flex: 2;
      background: var(--laranja);
      border: none;
      color: white;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .btn-enviar:hover { background: var(--laranja2); }

    /* TABELA */
    .table-wrapper {
      padding: 16px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead th {
      background: #1a1a1a;
      color: var(--texto-dim);
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 10px 14px;
      text-align: center;
      border-bottom: 1px solid var(--borda);
      white-space: nowrap;
    }

    tbody td {
      padding: 12px 14px;
      text-align: center;
      border-bottom: 1px solid #1e1e1e;
      vertical-align: middle;
    }

    tbody tr:hover { background: #161616; }

    .minha-linha {
      background: rgba(238,77,45,0.07) !important;
      border-left: 3px solid var(--laranja);
    }

    .minha-linha:hover {
      background: rgba(238,77,45,0.12) !important;
    }

    .tag-vaga {
      display: inline-block;
      background: #222;
      color: var(--texto);
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 4px;
      min-width: 44px;
    }

    .tag-status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .tag-status.carregar {
      background: rgba(34,197,94,0.15);
      color: var(--verde);
      border: 1px solid rgba(34,197,94,0.3);
    }

    .tag-status.patio {
      background: rgba(59,130,246,0.15);
      color: var(--azul);
      border: 1px solid rgba(59,130,246,0.3);
    }

    .tag-status.outro {
      background: rgba(255,255,255,0.05);
      color: var(--texto-dim);
      border: 1px solid var(--borda);
    }

    .tag-entrada-saida {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(245,158,11,0.1);
      color: var(--amarelo);
      border: 1px solid rgba(245,158,11,0.2);
      white-space: nowrap;
    }

    .tag-entrada-saida.vazio {
      background: transparent;
      color: var(--texto-dim);
      border-color: transparent;
      font-size: 13px;
    }

    .checkin-col {
      font-size: 18px;
    }

    /* TOAST */
    .toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      background: var(--card);
      border: 1px solid var(--borda);
      border-left: 3px solid var(--laranja);
      color: var(--texto);
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      animation: toastIn 0.3s ease;
      pointer-events: auto;
      max-width: 300px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .toast.verde { border-left-color: var(--verde); }
    .toast.azul { border-left-color: var(--azul); }

    .toast.saindo {
      animation: toastOut 0.3s ease forwards;
    }

    @keyframes toastIn {
      from { transform: translateX(320px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes toastOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(320px); opacity: 0; }
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--texto-dim);
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--borda);
      border-top-color: var(--laranja);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ROTA NOME TOPO */
    .meu-status-bar {
      background: rgba(238,77,45,0.08);
      border: 1px solid rgba(238,77,45,0.2);
      border-radius: 8px;
      padding: 10px 16px;
      margin: 12px 16px 0;
      display: none;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .meu-status-bar.ativo { display: flex; }

    .meu-status-bar .label {
      font-size: 12px;
      color: var(--texto-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .meu-status-bar .valor {
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--laranja);
    }

    .separador { color: var(--borda); }

    @media (max-width: 600px) {
      .header-logo h1 { font-size: 18px; }
      .table-wrapper { padding: 10px; }
      table { font-size: 12px; }
      thead th { font-size: 10px; padding: 8px 8px; }
      tbody td { padding: 10px 8px; }
      .tag-vaga { font-size: 15px; padding: 3px 8px; }
      .tag-status { font-size: 11px; padding: 3px 8px; }
    }
  </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- MODAL CHECK-IN -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>🚚 FAZER <span>CHECK-IN</span></h2>
    <div class="form-group">
      <label>ID Driver</label>
      <input type="number" id="inputId" placeholder="Ex: 2165448">
    </div>
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="inputNome" placeholder="Ex: João Silva" maxlength="30">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Letra da Rota</label>
        <select id="inputLetra">
          <option value="">--</option>
          <script>
            for(let i=65;i<=90;i++) document.write(`<option value="${String.fromCharCode(i)}">${String.fromCharCode(i)}</option>`);
          </script>
        </select>
      </div>
      <div class="form-group">
        <label>Número da Rota</label>
        <select id="inputNumero">
          <option value="">--</option>
          <script>
            for(let i=1;i<=50;i++) document.write(`<option value="${i}">${i}</option>`);
          </script>
        </select>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
      <button class="btn-enviar" onclick="enviarCheckin()">✓ ENVIAR</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <div class="dot"></div>
    <h1>VAGAS <span>GUICHÊ</span></h1>
  </div>
  <div class="header-status" id="headerStatus">
    <span>⏳ Conectando...</span>
  </div>
</div>

<!-- CHECKIN BAR -->
<div class="checkin-bar">
  <div class="checkin-info">
    <p>Ainda não fez check-in hoje?</p>
  </div>
  <div id="checkinStatusArea">
    <button class="btn-checkin" id="btnCheckin" onclick="abrirModal()">
      📋 FAZER CHECK-IN
    </button>
  </div>
</div>

<!-- MEU STATUS -->
<div class="meu-status-bar" id="meuStatusBar">
  <span class="label">Você:</span>
  <span class="valor" id="meuNomeDisplay">—</span>
  <span class="separador">|</span>
  <span class="label">Rota:</span>
  <span class="valor" id="minhaRotaDisplay">—</span>
  <span class="separador">|</span>
  <span id="meuCheckinStatus"></span>
</div>

<!-- TABELA -->
<div class="table-wrapper">
  <div id="conteudo" class="loading">
    <div class="spinner"></div>
    <p>Carregando vagas...</p>
  </div>
</div>

<script>
  // ============================================================
  // CONFIGURAÇÃO — ajuste antes de subir pro GitHub
  // ============================================================
  const GITHUB_USER = 'fatalzinho';
  const GITHUB_REPO = 'vagas-shopee';
  const VAGAS_JSON  = 'vagas.json';
  const CHECKIN_JSON = 'checkin.json';
  const POLL_MS = 8000; // verifica a cada 8 segundos
  // ============================================================

  let dadosAnteriores = [];
  let primeira = true;
  let meuCheckin = null; // {id, nome, rota} salvo em localStorage

  // Carrega dados salvos
  const savedCheckin = localStorage.getItem('meuCheckin');
  if (savedCheckin) {
    meuCheckin = JSON.parse(savedCheckin);
    atualizarBarraStatus();
  }

  // ---- MODAL ----
  function abrirModal() {
    // Se já tem dados salvos, preenche
    if (meuCheckin) {
      document.getElementById('inputId').value = meuCheckin.id || '';
      document.getElementById('inputNome').value = meuCheckin.nome || '';
      const [letra, num] = (meuCheckin.rota || '').split('-');
      document.getElementById('inputLetra').value = letra || '';
      document.getElementById('inputNumero').value = num || '';
    }
    document.getElementById('modalOverlay').classList.add('ativo');
  }

  function fecharModal() {
    document.getElementById('modalOverlay').classList.remove('ativo');
  }

  function enviarCheckin() {
    const id = document.getElementById('inputId').value.trim();
    const nome = document.getElementById('inputNome').value.trim();
    const letra = document.getElementById('inputLetra').value;
    const numero = document.getElementById('inputNumero').value;

    if (!id || !nome || !letra || !numero) {
      toast('⚠️ Preencha todos os campos!');
      return;
    }

    const rota = `${letra}-${numero}`;
    meuCheckin = { id, nome, rota, ts: Date.now() };
    localStorage.setItem('meuCheckin', JSON.stringify(meuCheckin));

    fecharModal();
    atualizarBarraStatus();
    toast('✅ Check-in enviado! Aguardando confirmação...', 'verde');
  }

  function atualizarBarraStatus() {
    if (!meuCheckin) return;

    document.getElementById('meuNomeDisplay').textContent = meuCheckin.nome;
    document.getElementById('minhaRotaDisplay').textContent = meuCheckin.rota;
    document.getElementById('meuStatusBar').classList.add('ativo');

    document.getElementById('btnCheckin').textContent = '✏️ ALTERAR CHECK-IN';
  }

  // ---- TOAST ----
  function toast(msg, tipo = '') {
    const c = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${tipo}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => {
      el.classList.add('saindo');
      setTimeout(() => el.remove(), 300);
    }, 4000);
  }

  // ---- FETCH JSON ----
  async function fetchJson(arquivo) {
    const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${arquivo}?t=${Date.now()}`;
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`Erro ${res.status}`);
    return res.json();
  }

  // ---- RENDERIZA TABELA ----
  function renderTabela(vagas, checkins) {
    const linhas = vagas.data;

    if (!linhas || linhas.length < 2) {
      document.getElementById('conteudo').innerHTML = `
        <div style="text-align:center;padding:60px 20px;color:#666;">
          <p style="font-size:40px;margin-bottom:12px">🌙</p>
          <p style="font-size:18px;font-weight:600;color:#aaa">Operações encerradas</p>
          <p style="font-size:14px;margin-top:8px">Sistema retorna amanhã às 4:30</p>
        </div>`;
      return;
    }

    // Mapa de checkins por rota
    const mapaCheckins = {};
    if (checkins && checkins.checkins) {
      checkins.checkins.forEach(c => {
        mapaCheckins[c.rota] = c;
      });
    }

    let html = `
      <table>
        <thead>
          <tr>
            <th>Turno</th>
            <th>Rota</th>
            <th>Vaga</th>
            <th>Status</th>
            <th>Entrada</th>
            <th>Saída</th>
            <th>Check-in</th>
          </tr>
        </thead>
        <tbody>`;

    const novos = [];

    linhas.slice(3).forEach(linha => {
      if (!linha || !linha[2]) return;

      const turno   = linha[0] || '';
      const rota    = linha[2] || '';
      const vaga    = linha[3] || '-';
      const status  = linha[4] || '';
      const entrada = linha[5] || '';
      const saida   = linha[6] || '';

      const chave = `${turno}-${rota}`;
      const ant = dadosAnteriores.find(d => d.chave === chave);
      const ehMinha = meuCheckin && rota && rota.toUpperCase() === meuCheckin.rota.toUpperCase();
      const checkinDaRota = mapaCheckins[rota];
      const checkinOk = checkinDaRota && checkinDaRota.status === 'confirmado';

      // Notificações de mudança
      if (!primeira && ant) {
        if (status.toLowerCase().includes('pátio') && (!ant.status || !ant.status.toLowerCase().includes('pátio'))) {
          toast(`📍 ${rota} → Entrar no pátio`, 'azul');
          if (ehMinha) falar(`Atenção! Rota ${rota}. Entrar no pátio!`);
        }
        if (vaga !== '-' && ant.vaga !== vaga) {
          toast(`🎯 ${rota} → Vaga ${vaga}`, 'verde');
          if (ehMinha) falar(`Atenção! Rota ${rota}. Vaga ${vaga}. Pode carregar!`);
        }
      }

      novos.push({ chave, vaga, status });

      // Status tag
      let statusCls = 'outro';
      if (status.toLowerCase().includes('carregar')) statusCls = 'carregar';
      else if (status.toLowerCase().includes('pátio') || status.toLowerCase().includes('patio')) statusCls = 'patio';

      // Check-in col
      let checkinHtml = '<span style="color:#444">—</span>';
      if (checkinOk) {
        checkinHtml = '<span style="color:#22c55e;font-size:20px">✅</span>';
      } else if (checkinDaRota && checkinDaRota.status === 'aguardando') {
        checkinHtml = '<span style="color:#f59e0b;font-size:16px">⏳</span>';
      }

      // Entrada/Saída
      const entradaHtml = entrada
        ? `<span class="tag-entrada-saida">${entrada}</span>`
        : `<span class="tag-entrada-saida vazio">—</span>`;
      const saidaHtml = saida
        ? `<span class="tag-entrada-saida">${saida}</span>`
        : `<span class="tag-entrada-saida vazio">—</span>`;

      html += `
        <tr class="${ehMinha ? 'minha-linha' : ''}">
          <td>${turno}</td>
          <td><strong style="font-family:'Rajdhani',sans-serif;font-size:16px">${rota}</strong></td>
          <td><span class="tag-vaga">${vaga}</span></td>
          <td><span class="tag-status ${statusCls}">${status}</span></td>
          <td>${entradaHtml}</td>
          <td>${saidaHtml}</td>
          <td class="checkin-col">${checkinHtml}</td>
        </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('conteudo').innerHTML = html;
    dadosAnteriores = novos;
    primeira = false;

    // Atualiza status do meu check-in na barra
    if (meuCheckin) {
      const meuC = mapaCheckins[meuCheckin.rota];
      const statusEl = document.getElementById('meuCheckinStatus');
      if (meuC && meuC.status === 'confirmado') {
        statusEl.innerHTML = `<span class="status-badge confirmado">✅ Check-in confirmado</span>`;
      } else if (meuC && meuC.status === 'aguardando') {
        statusEl.innerHTML = `<span class="status-badge aguardando">⏳ Aguardando confirmação</span>`;
      } else {
        statusEl.innerHTML = `<span class="status-badge aguardando">⏳ Pendente</span>`;
      }
    }
  }

  // ---- VOZ ----
  function falar(texto) {
    if (!('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(texto);
    u.lang = 'pt-BR';
    u.rate = 0.9;
    window.speechSynthesis.speak(u);
  }

  // ---- POLLING ----
  async function atualizar() {
    try {
      const [vagas, checkins] = await Promise.all([
        fetchJson(VAGAS_JSON),
        fetchJson(CHECKIN_JSON).catch(() => ({ checkins: [] }))
      ]);

      renderTabela(vagas, checkins);

      const agora = new Date(vagas.lastUpdate).toLocaleTimeString('pt-BR');
      document.getElementById('headerStatus').innerHTML =
        `<strong>🟢 AO VIVO</strong>Atualizado ${agora}`;

    } catch (e) {
      document.getElementById('headerStatus').innerHTML =
        `<span style="color:#ef4444">⚠️ Sem conexão</span>`;
      console.error(e);
    }
  }

  // Inicia
  atualizar();
  setInterval(atualizar, POLL_MS);
</script>
</body>
</html>
