<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vagas Guichê</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --laranja: #EE4D2D;
      --laranja2: #ff6b47;
      --preto: #0d0d0d;
      --card: #161616;
      --borda: #2a2a2a;
      --texto: #f0ece4;
      --texto-dim: #777;
      --verde: #22c55e;
      --azul: #3b82f6;
      --amarelo: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--preto);
      color: var(--texto);
      font-family: 'Noto Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--card);
      border-bottom: 2px solid var(--laranja);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo { display: flex; align-items: center; gap: 10px; }

    .dot {
      width: 10px; height: 10px;
      background: var(--laranja);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--laranja);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(.8); }
    }

    .header-logo h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 20px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
    }

    .header-logo h1 span { color: var(--laranja); }

    .header-status {
      font-size: 11px; color: var(--texto-dim);
      text-align: right; line-height: 1.5;
    }

    .header-status strong { display: block; color: var(--verde); font-size: 10px; }

    /* ── CONFIG BAR ── */
    .config-bar {
      background: #111;
      border-bottom: 1px solid var(--borda);
      padding: 10px 14px;
    }

    /* Linha 1: nome | letra | num | botão — tudo em uma linha */
    .config-linha1 {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #nomeInput {
      flex: 1;
      min-width: 0;
      background: #1e1e1e;
      border: 1px solid var(--borda);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--texto);
      font-family: 'Noto Sans', sans-serif;
      font-size: 14px;
      transition: border-color .2s;
    }

    #nomeInput::placeholder { color: #555; }
    #nomeInput:focus { outline: none; border-color: var(--laranja); }

    .sel-letra, .sel-num {
      background: #1e1e1e;
      border: 1px solid var(--borda);
      border-radius: 6px;
      padding: 8px 6px;
      color: var(--texto);
      font-family: 'Noto Sans', sans-serif;
      font-size: 14px;
      appearance: none; -webkit-appearance: none;
      text-align: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    .sel-letra { width: 58px; }
    .sel-num   { width: 56px; }

    .sel-letra:focus, .sel-num:focus { outline: none; border-color: var(--laranja); }

    .btn-notif {
      background: var(--verde); border: none; color: white;
      padding: 8px 10px; border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: .5px;
      cursor: pointer; transition: all .2s; white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-notif:hover { background: #16a34a; }
    .btn-notif.ativo { background: var(--azul); }

    /* Status notif — linha fina abaixo */
    #statusNotif {
      font-size: 12px; color: var(--verde);
      margin-top: 6px; display: none;
    }

    /* ── LINHA 2: entrada/saída | badge | botão checkin ── */
    .config-linha2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      gap: 8px;
    }

    .entrada-saida { display: flex; align-items: center; gap: 10px; }

    .es-item { display: flex; align-items: center; gap: 4px; }

    .es-label {
      color: var(--texto-dim); font-size: 10px;
      text-transform: uppercase; letter-spacing: .8px;
    }

    .es-valor {
      background: rgba(238,77,45,.12);
      border: 1px solid rgba(238,77,45,.3);
      color: var(--laranja);
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px;
    }

    .es-valor.vazio { background: transparent; border-color: transparent; color: #444; }

    .checkin-area { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 20px;
      font-size: 10px; font-weight: 600; white-space: nowrap;
    }

    .badge.aguardando {
      background: rgba(245,158,11,.15);
      border: 1px solid var(--amarelo); color: var(--amarelo);
    }

    .badge.confirmado {
      background: rgba(34,197,94,.15);
      border: 1px solid var(--verde); color: var(--verde);
    }

    .btn-checkin {
      background: var(--laranja); border: none; color: white;
      padding: 8px 12px; border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: .5px;
      cursor: pointer; transition: all .2s; white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-checkin:hover { background: var(--laranja2); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.85); z-index: 1000;
      align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.ativo { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--borda);
      border-top: 3px solid var(--laranja);
      border-radius: 12px; padding: 24px;
      width: 90%; max-width: 400px;
      animation: slideUp .3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal h2 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 19px; font-weight: 700;
      letter-spacing: 1px; margin-bottom: 18px;
    }

    .modal h2 span { color: var(--laranja); }

    .form-group { margin-bottom: 13px; }

    .form-group label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--texto-dim); margin-bottom: 5px;
    }

    .form-group input,
    .form-group select {
      width: 100%; background: #1e1e1e;
      border: 1px solid var(--borda); border-radius: 6px;
      padding: 9px 12px; color: var(--texto);
      font-family: 'Noto Sans', sans-serif; font-size: 14px;
      appearance: none; transition: border-color .2s;
    }

    .form-group input:focus,
    .form-group select:focus { outline: none; border-color: var(--laranja); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .modal-btns { display: flex; gap: 10px; margin-top: 18px; }

    .btn-cancelar {
      flex: 1; background: transparent;
      border: 1px solid var(--borda); color: var(--texto-dim);
      padding: 9px; border-radius: 6px; cursor: pointer;
      font-size: 14px; transition: all .2s;
    }

    .btn-cancelar:hover { border-color: #555; color: var(--texto); }

    .btn-enviar {
      flex: 2; background: var(--laranja); border: none; color: white;
      padding: 9px; border-radius: 6px; cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px; font-weight: 700; letter-spacing: 1px;
      transition: background .2s;
    }

    .btn-enviar:hover { background: var(--laranja2); }

    /* ── TABELA ── */
    .table-wrapper { padding: 12px; overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }

    th {
      background: linear-gradient(135deg,#1a3a5c,#0d2440);
      color: white;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 10px 10px; text-align: center;
      border-bottom: 1px solid var(--borda);
      position: sticky; top: 0; z-index: 10; white-space: nowrap;
    }

    td {
      padding: 11px 10px; text-align: center;
      border-bottom: 1px solid #1e1e1e;
      vertical-align: middle; font-size: 13px;
    }

    tbody tr { transition: background .15s; }
    tbody tr:hover { background: #1a1a1a; }

    .minha-linha {
      background: rgba(238,77,45,.07) !important;
      border-left: 3px solid var(--laranja);
    }

    .minha-linha:hover { background: rgba(238,77,45,.12) !important; }

    .vaga-cell {
      background: #222; color: var(--texto);
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px; font-weight: 700;
      border-radius: 4px; display: inline-block;
      padding: 2px 10px; min-width: 40px;
    }

    .tag-carregar {
      background: linear-gradient(135deg,#22c55e,#16a34a);
      color: white; font-weight: bold;
      border-radius: 5px; padding: 3px 8px; font-size: 12px;
    }

    .tag-patio {
      background: linear-gradient(135deg,#3b82f6,#1d4ed8);
      color: white; font-weight: bold;
      border-radius: 5px; padding: 3px 8px; font-size: 12px;
    }

    /* ── ALERTA GRANDE ── */
    .alerta-rota {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: linear-gradient(135deg,#22c55e,#16a34a);
      color: white; padding: 36px 50px; border-radius: 20px;
      font-size: 24px; font-weight: bold;
      box-shadow: 0 10px 40px rgba(0,0,0,.5);
      z-index: 10000; text-align: center;
      animation: alertaPulse .5s ease-out;
      max-width: 90%;
    }

    @keyframes alertaPulse {
      from { transform: translate(-50%,-50%) scale(.8); opacity:0; }
      to   { transform: translate(-50%,-50%) scale(1);  opacity:1; }
    }

    .alerta-rota .btn-fechar {
      position: absolute; top: 12px; right: 12px;
      background: rgba(255,255,255,.3); border: none;
      color: white; font-size: 22px; font-weight: bold;
      width: 34px; height: 34px; border-radius: 50%;
      cursor: pointer; transition: all .3s;
    }

    .alerta-rota .btn-fechar:hover {
      background: rgba(255,255,255,.5); transform: rotate(90deg);
    }

    /* ── TOAST ── */
    .toast-container {
      position: fixed; top: 12px; right: 12px;
      z-index: 9999; display: flex; flex-direction: column;
      gap: 8px; pointer-events: none; max-width: 300px;
    }

    .toast {
      background: var(--card); border: 1px solid var(--borda);
      border-left: 3px solid var(--laranja); color: var(--texto);
      padding: 10px 14px; border-radius: 8px; font-size: 13px;
      font-weight: 500; animation: toastIn .35s ease;
      pointer-events: auto; box-shadow: 0 4px 20px rgba(0,0,0,.5);
    }

    .toast.vaga  { border-left-color: var(--verde); }
    .toast.patio { border-left-color: var(--azul); }
    .toast.saindo { animation: toastOut .3s ease forwards; }

    @keyframes toastIn  { from{transform:translateX(320px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes toastOut { from{transform:translateX(0);opacity:1} to{transform:translateX(320px);opacity:0} }

    .loading { text-align:center; padding:50px 20px; color:var(--texto-dim); font-size:15px; }

    /* ── DESKTOP ── */
    @media (min-width: 640px) {
      .header { padding: 14px 20px; }
      .header-logo h1 { font-size: 22px; }
      .config-bar { padding: 12px 20px; }
      .config-linha1 { gap: 10px; }
      .sel-letra { width: 76px; }
      .sel-num   { width: 76px; }
      .btn-notif { font-size: 15px; padding: 8px 16px; }
      .btn-checkin { font-size: 15px; padding: 9px 18px; }
      th { font-size: 13px; padding: 12px 14px; }
      td { font-size: 14px; padding: 12px 14px; }
      .vaga-cell { font-size: 20px; }
    }

    @media (min-width: 1024px) {
      td, th { padding: 15px 14px; font-size: 15px; }
      .vaga-cell { font-size: 22px; }
    }

    @media (min-width: 1600px) {
      td, th { padding: 18px 16px; font-size: 17px; }
      .vaga-cell { font-size: 26px; }
    }
  </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- MODAL CHECK-IN -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>🚚 FAZER <span>CHECK-IN</span></h2>
    <div class="form-group">
      <label>ID Driver</label>
      <input type="number" id="inputId" placeholder="Ex: 2165448">
    </div>
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="inputNome" placeholder="Ex: João Silva" maxlength="30">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Letra da Rota</label>
        <select id="inputLetra"><option value="">--</option></select>
      </div>
      <div class="form-group">
        <label>Número da Rota</label>
        <select id="inputNumero"><option value="">--</option></select>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
      <button class="btn-enviar"   onclick="enviarCheckin()">✓ ENVIAR</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <div class="dot"></div>
    <h1>VAGAS <span>GUICHÊ</span></h1>
  </div>
  <div class="header-status" id="headerStatus"><span>⏳ Conectando...</span></div>
</div>

<!-- CONFIG BAR -->
<div class="config-bar">
  <!-- Linha 1: nome | letra | num | botão notificações -->
  <div class="config-linha1">
    <input type="text" id="nomeInput" placeholder="Seu nome" maxlength="20">
    <select id="letraSelect" class="sel-letra"><option value="">Letra</option></select>
    <select id="numeroSelect" class="sel-num"><option value="">Nº</option></select>
    <button class="btn-notif" id="btnAtivar" onclick="salvar()">🔔 Ativar</button>
  </div>
  <div id="statusNotif"></div>

  <!-- Linha 2: entrada/saída | badge | botão checkin -->
  <div class="config-linha2">
    <div class="entrada-saida">
      <div class="es-item">
        <span class="es-label">Entrada:</span>
        <span class="es-valor vazio" id="esEntrada">—</span>
      </div>
      <div class="es-item">
        <span class="es-label">Saída:</span>
        <span class="es-valor vazio" id="esSaida">—</span>
      </div>
    </div>
    <div class="checkin-area">
      <span id="checkinBadge"></span>
      <button class="btn-checkin" id="btnCheckin" onclick="abrirModal()">
        📋 CHECK-IN
      </button>
    </div>
  </div>
</div>

<!-- TABELA -->
<div class="table-wrapper">
  <div id="conteudo" class="loading"><p>⏳ Carregando...</p></div>
</div>

<script>
  const GITHUB_USER  = 'fatalzinho';
  const GITHUB_REPO  = 'vagas-shopee';
  const VAGAS_JSON   = 'vagas.json';
  const CHECKIN_JSON = 'checkin.json';
  const POLL_MS      = 8000;

  // Preenche selects
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
    ['letraSelect','inputLetra'].forEach(id => {
      const o = document.createElement('option');
      o.value = l; o.textContent = l;
      document.getElementById(id).appendChild(o);
    });
  });
  for (let i=1;i<=50;i++) {
    ['numeroSelect','inputNumero'].forEach(id => {
      const o = document.createElement('option');
      o.value = i; o.textContent = i;
      document.getElementById(id).appendChild(o);
    });
  }

  let nome = localStorage.getItem('nome') || '';
  let rota = localStorage.getItem('rota') || '';
  let dadosAnteriores = [];
  let primeira = true;
  let meuCheckin = null;

  if (nome) document.getElementById('nomeInput').value = nome;
  const letraSalva = localStorage.getItem('letra');
  const numSalvo   = localStorage.getItem('numero');
  if (letraSalva) document.getElementById('letraSelect').value = letraSalva;
  if (numSalvo)   document.getElementById('numeroSelect').value = numSalvo;

  const saved = localStorage.getItem('meuCheckin');
  if (saved) { meuCheckin = JSON.parse(saved); atualizarBotao(); }

  if (nome && rota) {
    document.getElementById('btnAtivar').textContent = '✅ Ativo';
    document.getElementById('btnAtivar').classList.add('ativo');
    document.getElementById('statusNotif').textContent = `🔔 ${nome} — Rota ${rota}`;
    document.getElementById('statusNotif').style.display = 'block';
  }

  async function salvar() {
    nome = document.getElementById('nomeInput').value.trim();
    const letra  = document.getElementById('letraSelect').value;
    const numero = document.getElementById('numeroSelect').value;

    if (!nome)             { alert('⚠️ Digite seu nome!'); return; }
    if (!letra || !numero) { alert('⚠️ Selecione letra e número!'); return; }

    rota = `${letra}-${numero}`;
    localStorage.setItem('nome', nome);
    localStorage.setItem('rota', rota);
    localStorage.setItem('letra', letra);
    localStorage.setItem('numero', numero);

    if ('Notification' in window) await Notification.requestPermission();

    try {
      if ('wakeLock' in navigator) {
        await navigator.wakeLock.request('screen');
        document.addEventListener('visibilitychange', async () => {
          if (document.visibilityState === 'visible')
            await navigator.wakeLock.request('screen').catch(()=>{});
        });
      }
    } catch(e) {}

    document.getElementById('btnAtivar').textContent = '✅ Ativo';
    document.getElementById('btnAtivar').classList.add('ativo');
    document.getElementById('statusNotif').textContent = `🔔 ${nome} — Rota ${rota}`;
    document.getElementById('statusNotif').style.display = 'block';
    alert(`✅ ${nome}, notificações ativadas para rota ${rota}!\n📱 Tela ficará ligada.`);
    primeira = true;
  }

  function abrirModal() {
    if (meuCheckin) {
      document.getElementById('inputId').value   = meuCheckin.id   || '';
      document.getElementById('inputNome').value = meuCheckin.nome || '';
      const [l,n] = (meuCheckin.rota||'').split('-');
      document.getElementById('inputLetra').value  = l || '';
      document.getElementById('inputNumero').value = n || '';
    }
    document.getElementById('modalOverlay').classList.add('ativo');
  }

  function fecharModal() {
    document.getElementById('modalOverlay').classList.remove('ativo');
  }

  function enviarCheckin() {
    const id    = document.getElementById('inputId').value.trim();
    const nome2 = document.getElementById('inputNome').value.trim();
    const letra = document.getElementById('inputLetra').value;
    const num   = document.getElementById('inputNumero').value;

    if (!id||!nome2||!letra||!num) { toast('⚠️ Preencha todos os campos!'); return; }

    meuCheckin = { id, nome: nome2, rota: `${letra}-${num}`, ts: Date.now() };
    localStorage.setItem('meuCheckin', JSON.stringify(meuCheckin));
    fecharModal();
    atualizarBotao();
    toast('✅ Check-in enviado! Aguardando confirmação...', 'vaga');
  }

  function atualizarBotao() {
    if (meuCheckin) document.getElementById('btnCheckin').textContent = '✏️ ALTERAR';
  }

  function toast(msg, tipo='') {
    const c  = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${tipo}`; el.innerHTML = msg;
    c.appendChild(el);
    setTimeout(() => { el.classList.add('saindo'); setTimeout(() => el.remove(), 300); }, 4000);
  }

  function alerta(msg) {
    const div = document.createElement('div');
    div.className = 'alerta-rota';
    const btn = document.createElement('button');
    btn.className = 'btn-fechar'; btn.innerHTML = '×';
    btn.onclick = () => div.remove();
    div.innerHTML = msg; div.appendChild(btn);
    document.body.appendChild(div);
    setTimeout(() => { if(div.parentNode) div.remove(); }, 10000);
  }

  function falar(texto) {
    if (!('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(texto);
    u.lang='pt-BR'; u.rate=0.9; u.pitch=1.2; u.volume=1.0;
    u.onend = () => setTimeout(() => {
      const u2 = new SpeechSynthesisUtterance(texto);
      u2.lang='pt-BR'; u2.rate=0.9; u2.pitch=1.2;
      window.speechSynthesis.speak(u2);
    }, 500);
    window.speechSynthesis.speak(u);
  }

  function notificar(tipo, vaga) {
    const t = tipo === 'patio'
      ? { voz: `${nome}! Rota ${rota}. Entrar no pátio!`,
          alerta: `📍 ${nome}!<br>Rota ${rota}<br>ENTRAR NO PÁTIO`,
          n: [`📍 ${nome}!`, `Rota ${rota} ENTRAR NO PÁTIO`] }
      : { voz: `${nome}! Rota ${rota}. Vaga ${vaga}. Pode carregar!`,
          alerta: `🎯 ${nome}!<br>Rota ${rota}<br>VAGA ${vaga}<br>PODE CARREGAR!`,
          n: [`🎯 ${nome}!`, `Rota ${rota} VAGA ${vaga} PODE CARREGAR!`] };

    falar(t.voz);
    if (Notification.permission === 'granted') {
      try {
        const n = new Notification(t.n[0], { body: t.n[1], tag: `${tipo}-${rota}`, requireInteraction: true });
        n.onclick = () => { window.focus(); n.close(); };
      } catch(e) {}
    }
    alerta(t.alerta);
  }

  const READONLY_TOKEN = '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';

  async function fetchJson(arq) {
    const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${arq}`;
    const r = await fetch(url, {
      cache: 'no-store',
      headers: { Authorization: `token ${READONLY_TOKEN}` }
    });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    return JSON.parse(atob(data.content.replace(/\n/g, '')));
  }

  function atualizarES(entrada, saida) {
    const eEl = document.getElementById('esEntrada');
    const sEl = document.getElementById('esSaida');
    if (entrada) { eEl.textContent = entrada; eEl.classList.remove('vazio'); }
    else         { eEl.textContent = '—';     eEl.classList.add('vazio');   }
    if (saida)   { sEl.textContent = saida;   sEl.classList.remove('vazio'); }
    else         { sEl.textContent = '—';     sEl.classList.add('vazio');   }
  }

  function processar(vagas, checkins) {
    const linhas = vagas.data;

    if (!linhas || linhas.length < 4) {
      document.getElementById('conteudo').innerHTML = `
        <div class="loading">
          <p style="font-size:44px;margin-bottom:12px">🌙</p>
          <p style="font-size:18px;font-weight:bold;color:#aaa">Operações encerradas hoje</p>
          <p style="font-size:13px;color:#666;margin-top:8px">Sistema retorna amanhã às 4:30 da manhã.</p>
        </div>`;
      document.getElementById('headerStatus').innerHTML = '🌙 Encerrado';
      return;
    }

    const mapaC = {};
    if (checkins && checkins.checkins)
      checkins.checkins.forEach(c => { mapaC[c.rota] = c; });

    if (meuCheckin) {
      const meuC = mapaC[meuCheckin.rota];
      if (meuC && meuC.status === 'confirmado') {
        atualizarES(meuC.entrada, meuC.saida);
        document.getElementById('checkinBadge').innerHTML =
          `<span class="badge confirmado">✅ Confirmado</span>`;
      } else if (meuC && meuC.status === 'aguardando') {
        atualizarES('', '');
        document.getElementById('checkinBadge').innerHTML =
          `<span class="badge aguardando">⏳ Aguardando</span>`;
      } else {
        atualizarES('', '');
        document.getElementById('checkinBadge').innerHTML =
          `<span class="badge aguardando">⏳ Pendente</span>`;
      }
    } else {
      atualizarES('', '');
      document.getElementById('checkinBadge').innerHTML = '';
    }

    const novos = [];
    let html = `<table>
      <tr><th>TURNO</th><th>ROTA</th><th>VAGA</th><th>STATUS</th><th>CHECK-IN</th></tr>`;

    linhas.slice(3).forEach(linha => {
      if (!linha || !linha[2]) return;

      const turno   = linha[0] || '';
      const r       = linha[2] || '';
      const v       = linha[3] !== undefined ? linha[3] : '-';
      const s       = linha[4] || '';
      const checkin = linha[5];

      const chave   = `${turno}-${r}`;
      const ant     = dadosAnteriores.find(d => d.chave === chave);
      const ehMinha = rota && r && r.toUpperCase() === rota.toUpperCase();

      if (!primeira && ant) {
        if (s.toLowerCase().includes('pátio') && (!ant.status||!ant.status.toLowerCase().includes('patio')))
          toast(`<strong>${r}</strong> → Entrar no pátio`, 'patio');
        if (v !== '-' && ant.vaga !== String(v))
          toast(`<strong>${r}</strong> → Vaga ${v}`, 'vaga');
      }

      if (ehMinha && !primeira && ant) {
        if (s.toLowerCase().includes('pátio') && (!ant.status||!ant.status.toLowerCase().includes('patio')))
          notificar('patio');
        if (v !== '-' && ant.vaga !== String(v))
          notificar('vaga', v);
      }

      novos.push({ chave, vaga: String(v), status: s });

      let cls = '';
      if (s.toLowerCase().includes('carregar')) cls = 'tag-carregar';
      else if (s.toLowerCase().includes('patio')) cls = 'tag-patio';

      let checkinHtml = '';
      if      (checkin === true  || checkin === 'TRUE')  checkinHtml = '✅';
      else if (checkin === false || checkin === 'FALSE') checkinHtml = '❌';

      html += `<tr class="${ehMinha ? 'minha-linha' : ''}">
        <td>${turno}</td>
        <td><strong>${r}</strong></td>
        <td><span class="vaga-cell">${v}</span></td>
        <td><span class="${cls}">${s}</span></td>
        <td style="font-size:17px">${checkinHtml}</td>
      </tr>`;
    });

    html += '</table>';
    document.getElementById('conteudo').innerHTML = html;
    dadosAnteriores = novos;
    primeira = false;

    const agora = new Date(vagas.lastUpdate).toLocaleString('pt-BR');
    const et    = vagas.estadoSistema || '';
    let emoji   = '⏸️ Standby';
    if      (et.includes('ATIVO'))                        emoji = '🟢 Operando';
    else if (et === 'AGUARDANDO_AM')                      emoji = '⏳ Aguardando AM';
    else if (et === 'AM_COMPLETO')                        emoji = '☕ Intervalo';
    else if (et === 'ENCERRADO' || et === 'PM_COMPLETO')  emoji = '🌙 Encerrado';

    document.getElementById('headerStatus').innerHTML =
      `<strong>🟢 AO VIVO</strong>${emoji} • ${agora}`;
  }

  async function atualizar() {
    try {
      const [vagas, checkins] = await Promise.all([
        fetchJson(VAGAS_JSON),
        fetchJson(CHECKIN_JSON).catch(() => ({ checkins: [] }))
      ]);
      processar(vagas, checkins);
    } catch(e) {
      document.getElementById('headerStatus').innerHTML =
        `<span style="color:#ef4444">⚠️ Sem conexão</span>`;
      console.error(e);
    }
  }

  atualizar();
  setInterval(atualizar, POLL_MS);
</script>
</body>
</html>
